name: Auto Push Changes

on:
  schedule:
    - cron: "*/5 * * * *"  # Runs every 5 minutes

jobs:
  push_changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config --global user.name "Abdul Kaiyum"
          git config --global user.email "abdulkaiyum22113344@gmail.com"

      - name: Auto Commit and Push
        run: |
          git add .
          git commit -m "Auto-update: $(date)" || exit 0
          git push origin main
